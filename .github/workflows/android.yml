name: Android CI

on:
  push:
    branches: [ main, master, 'claude/**' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest --stacktrace

    - name: Build debug APK
      id: build
      run: |
        ./gradlew assembleDebug --stacktrace > assemble-output.log 2>&1 || {
          echo "assembleDebug failed!"
          tail -80 assemble-output.log
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "$(jq -n --arg title "CI: assembleDebug failure on ${GITHUB_SHA:0:8}" --arg body "$(tail -100 assemble-output.log)" '{title: $title, body: ("## assembleDebug output\n```\n" + $body + "\n```"), labels: ["ci-debug"]}')" || true
          exit 1
        }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/reports/tests/

name: Android CI

on:
  push:
    branches: [ main, master, 'claude/**' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Run unit tests
      id: tests
      run: |
        ./gradlew testDebugUnitTest --stacktrace > build-output.log 2>&1 || {
          echo "GRADLE_EXIT_CODE=$?" >> $GITHUB_ENV
          echo "## Build failed! Last 80 lines:" >&2
          tail -80 build-output.log >&2
          # Create issue with curl
          BODY=$(tail -100 build-output.log | jq -Rs .)
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "{\"title\":\"CI: Build failure on ${GITHUB_SHA:0:8}\",\"body\":\"## Build output\\n\`\`\`\\n$(tail -100 build-output.log | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')\\n\`\`\`\",\"labels\":[\"ci-debug\"]}" || true
          exit 1
        }

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/reports/tests/
